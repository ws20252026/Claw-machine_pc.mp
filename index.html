<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廉能挑戰賽-文山區公所</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 這裡加入一些結構調整用的 CSS，確保排版準確 */
        .row-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            margin-bottom: 10px;
        }
        .info-centered {
            text-align: center;
            margin: 10px 0;
            font-weight: bold;
            color: #2c3e50;
            background: rgba(255,255,255,0.6);
            padding: 5px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="login-overlay" class="login-screen">
    <div class="login-card">
        <h2>🛡️ 廉政挑戰賽</h2>
        <p>請輸入您的姓名或分機開始挑戰</p>
        <input type="text" id="player-name" placeholder="您的名字..." maxlength="10">
        <button class="action-btn" id="start-btn">進入遊戲</button>
        <p style="font-size: 11px; color: #888; margin-top: 15px;">文山區公所政風室自製</p>
    </div>
</div>

<div id="game-container">
    
    <div class="question-box" style="width: 100%; margin-bottom: 10px;">
        <div style="text-align: center;">
            <strong style="color: #2980b9;">🛡️ 挑戰題目</strong><br>
            <span id="target-answer" style="font-size: 18px; color: #c0392b;">載入中...</span>
        </div>
    </div>

    <div class="info-centered">
        <span id="instruction">🎮 任務：抓取正確答案</span> | 
        <span id="user-display">挑戰者：未登錄</span> |
        <span>得分：<span id="score">0</span></span>
    </div>

    <div class="row-container">
        <button id="shuffle-btn" onclick="shufflePositions()" style="
            background: #f39c12; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            padding: 8px 15px; 
            font-size: 13px;
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px #d35400;
            transition: 0.2s;">
            📦 選項太擠？
        </button>

        <div class="timer-box" style="margin: 0; padding: 5px 15px; background: white; border-radius: 20px; border: 2px solid #e74c3c; font-weight: bold; color: #e74c3c;">
            ⏱️ 剩餘：<span id="timer">90</span>s
        </div>
    </div>
   
    <div id="machine-wrapper">
        <div id="machine-inner">
            <div id="claw-body">
                <div class="line"></div>
                <div class="hand"></div>
            </div>
            <div id="items-area"></div>
            
            <div id="game-over-overlay" class="overlay" style="display:none;">
                <h2>⌛ 時間到！</h2>
                <p>最終得分：<span id="final-score">0</span></p>
                <button class="action-btn" onclick="restartGame()">重新挑戰</button>
            </div>

            <div id="win-overlay" class="overlay" style="display:none;">
                <h2>🏆 恭喜通關！</h2>
                <button class="action-btn" onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <button class="ctrl-btn" id="btn-left">⬅️ 左移</button>
        <button class="ctrl-btn" id="btn-drop">🏗️ 抓取</button>
        <button class="ctrl-btn" id="btn-right">右移 ➡️</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <button id="manual-reset-btn" onclick="confirmReset()" style="font-size: 11px; padding: 5px 10px; background: #95a5a6; color: white; border: none; border-radius: 5px;">🔄 重新開始</button>
        <div style="font-size: 12px; color: #bdc3c7; font-weight: bold;">
            文山區公所政風室自製
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
