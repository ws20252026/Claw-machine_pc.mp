<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廉能挑戰賽-文山區公所</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-overlay" class="login-screen">
    <div class="login-card">
        <h2>🛡️ 廉政挑戰賽</h2>
        <p>請輸入您的姓名或分機開始挑戰</p>
        <input type="text" id="player-name" placeholder="您的名字..." maxlength="10">
        <button class="action-btn" id="start-btn">進入遊戲</button>
        <p style="font-size: 11px; color: #888; margin-top: 15px;">文山區公所政風室自製</p>
    </div>
</div>

<div id="game-container">
    <div id="header">
        <div class="question-box">
            <div>🛡️ 題目：<br><span id="target-answer">載入中...</span></div>
        </div>
        <div class="header-right">
            <div id="user-display">挑戰者：未登錄</div>
            <div class="score-box">得分：<span id="score">0</span> / 100</div>
            <button id="manual-reset-btn" onclick="confirmReset()">🔄 重新開始</button>
        </div>
    </div>
    
    <div id="status-bar">
        <div class="timer-box">⏱️ 剩餘時間：<span id="timer">90</span>s</div>
        <div id="instruction" style="font-size: 12px; margin-top: 5px;">🎮 任務：移動並夾取正確答案！</div>
    </div>

    <div id="machine-wrapper">
        <div id="machine-inner">
            <div id="claw-body">
                <div class="line"></div>
                <div class="hand"></div>
            </div>
            <div id="items-area"></div>
            
            <div id="game-over-overlay" class="overlay" style="display:none;">
                <h2>⌛ 時間到！</h2>
                <p>最終得分：<span id="final-score">0</span></p>
                <button class="action-btn" onclick="restartGame()">重新挑戰</button>
            </div>

            <div id="win-overlay" class="overlay" style="display:none;">
                <h2>🏆 恭喜通關！</h2>
                <button class="action-btn" onclick="restartGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <button class="ctrl-btn" id="btn-left">⬅️ 左移</button>
        <button class="ctrl-btn" id="btn-drop">🏗️ 抓取</button>
        <button class="ctrl-btn" id="btn-right">右移 ➡️</button>
    </div>

    <div style="text-align: right; font-size: 12px; color: #bdc3c7; margin-top: 10px; font-weight: bold;">
        文山區公所政風室自製
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
