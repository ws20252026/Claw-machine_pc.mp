<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廉政大夾擊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-overlay" class="login-screen">
    <div class="login-card">
        <h2>🛡️ 廉政大夾擊</h2>
        <p>請輸入您的姓名或分機</p>
        <input type="text" id="player-name" placeholder="例如：310" maxlength="10">
        <button type="button" class="action-btn" id="start-btn">進入遊戲</button>
        <p style="font-size: 11px; color: #888; margin-top: 15px;">文山區公所政風室自製</p>
    </div>
</div>

<div id="game-container">
    <div id="header">
        <div class="question-box"><span id="target-answer">載入中...</span></div>
        <div class="header-right">
            <div id="user-display">挑戰者：-</div>
            <div class="score-box">得分：<span id="score">0</span></div>
        </div>
    </div>
    
    <div id="status-bar">
        <div class="timer-box">⏱️ <span id="timer">90</span>s</div>
    </div>

    <div id="machine-wrapper">
        <div id="claw-body">
            <div class="line"></div>
            <div class="hand"></div>
        </div>
        <div id="items-area"></div>
        
        <div id="game-over-overlay" class="overlay" style="display:none;">
            <h2>⌛ 時間到！</h2>
            <p>最終得分：<span id="final-score">0</span></p>
            <button class="action-btn" onclick="location.reload()">重新挑戰</button>
        </div>
    </div>

    <div id="mobile-controls">
        <button class="ctrl-btn" id="btn-left">⬅️ 左移</button>
        <button class="ctrl-btn" id="btn-drop">🏗️ 抓取</button>
        <button class="ctrl-btn" id="btn-right">右移 ➡️</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
